<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morat-InicioSesión</title>
  <link rel="icon" type="image/png" href="../assets/icons/iconoweb.png">
  <link rel="stylesheet" href="../assets/styles/index.css">
    <link rel="stylesheet" href="../assets/styles/pages/login.css">

</head>
<body>
      
    <!-- Cabecera -->
  <header class="cabecera">
      <a href="../index.html" class="enlace-cabecera">
          <h1>MOR<span>AT</span></h1>
          <p>Bogotá, Colombia - Pop Rock - Desde 2011</p>
      </a>
  </header>
 
  <main class="contenedor-login">
    <div class="tarjeta">
 
      <div class="cabecera-marca">
        <span class="marca-nombre">Raul 1DAW</span>
      </div>
 
      <h1 class="titulo">Bienvenido<br>de nuevo</h1>
      <p class="subtitulo">Inicia sesión para continuar</p>
      <div class="linea"></div>
 
      
      <form class="formulario" id="formLogin">
 
          <div class="grupo">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="tu usuario" autocomplete="username">
          </div>

          <div class="grupo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          </div>

          <div class="opciones">
            <label class="recuerdame">
              <input type="checkbox">
              <span>Recuérdame</span>
            </label>
            <a href="../pages/recuperacioncontrasena.html" class="olvidaste">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="boton">Iniciar sesión</button>

          <p id="mensajeLogin" class="mensaje-error"></p>
 
      </form>
 
      <p class="pie-form">¿No tienes cuenta? <a href="../pages/registro.html">Regístrate</a></p>
 
    </div>
  </main>
 
  <!-- footer -->
  <footer class="pie" style="margin-top: 80px;">
        <p><small>@2025</small> <span>Morat</span> Web Fan - Hecho en 1º DAW por Raul Blanque</p>
  </footer>
 
  <script src="../js/index.js"></script>
</body>
</html>
