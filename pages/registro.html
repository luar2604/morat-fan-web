<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morat-Registro</title>
  <link rel="icon" type="image/png" href="../assets/icons/iconoweb.png">
  <link rel="stylesheet" href="../assets/styles/index.css">
    <link rel="stylesheet" href="../assets/styles/pages/login.css">

</head>
<body>
      
    <!-- CABECERA -->
  <header class="cabecera">
      <a href="../index.html" class="enlace-cabecera">
          <h1>MOR<span>AT</span></h1>
          <p>Bogotá, Colombia - Pop Rock - Desde 2010</p>
      </a>
  </header>
 
  <main class="contenedor">
    <div class="tarjeta">
 
      <div class="cabecera-marca">
        <span class="marca-nombre">Raul 1DAW</span>
      </div>
 
      <h1 class="titulo">Crear<br>cuenta</h1>
      <p class="subtitulo">Regístrate para continuar</p>
      <div class="linea"></div>
 
      <form class="formulario" id="formRegistro">
 
          <div class="grupo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre completo" autocomplete="name">
          </div>

          <div class="grupo">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Elige un nombre de usuario" autocomplete="username">
          </div>

          <div class="grupo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
          </div>

          <div class="grupo">
            <label for="password1">Confirma contraseña</label>
            <input type="password" id="password1" placeholder="••••••••" autocomplete="new-password">
          </div>

          <button type="submit" class="boton">Registrar cuenta</button>

          <p id="mensajeRegistro" class="mensaje-error" ></p>
 
      </form>
 
      <p class="pie-form">¿Ya tienes cuenta? <a href="../pages/login.html">Inicia sesión</a></p>
 
    </div>
  </main>
 
  <!-- footer -->
  <footer class="pie" >
        <p><small>@2025</small> <span>Morat</span> Web Fan - Hecho en 1º DAW por Raul Blanque</p>
  </footer>
 
  <script src="../js/index.js"></script>
</body>
</html>
