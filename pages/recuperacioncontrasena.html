<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morat-Recuperacion</title>
  <link rel="icon" type="image/png" href="../assets/icons/iconoweb.png">
  <link rel="stylesheet" href="../assets/styles/index.css">
    <link rel="stylesheet" href="../assets/styles/pages/login.css">

</head>
<body>
      
   <!-- CABECERA -->
  <header class="cabecera">
      <a href="../index.html" class="enlace-cabecera">
          <h1>MOR<span>AT</span></h1>
          <p>Bogotá, Colombia - Pop Rock - Desde 2011</p>
      </a>
  </header>
 
  <main class="contenedor-login">
    <div class="tarjeta">
 
      <div class="cabecera-marca">
        <span class="marca-nombre">Raul 1DAW</span>
      </div>
 
      <h1 class="titulo">Recuperar<br>contraseña</h1>
      <p class="subtitulo">Introduce tu usuario y nueva contraseña</p>
      <div class="linea"></div>
 

        <form class="formulario" id="formRecuperacion">

          <div class="grupo">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Tu nombre de usuario">
          </div>

          <div class="grupo">
            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
          </div>

          <div class="grupo">
            <label for="password1">Confirma contraseña</label>
            <input type="password" id="password1" placeholder="••••••••">
          </div>

          <button type="submit" class="boton">Cambiar contraseña</button>

          <p id="mensajeRecuperacion" class="mensaje-error" ></p>
 
      </form>
 
      <p class="pie-form">¿Recuerdas tu contraseña? <a href="../pages/login.html">Inicia sesión</a></p>
 
    </div>
  </main>
 
  <!-- footer -->
  <footer class="pie" >
        <p><small>@2025</small> <span>Morat</span> Web Fan - Hecho en 1º DAW por Raul Blanque</p>
  </footer>
 
  <script src="../js/index.js"></script>
</body>
</html>
